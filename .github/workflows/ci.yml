name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # JOB 1: Build & Test (CI)
  # Spustí se při každém push na jakoukoliv větev
  # ============================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rezervace_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rezervace_test

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Build (kompilace TypeScript)
        run: npm run build

      - name: Lint (statická kontrola kvality)
        run: npm run lint

      - name: Unit testy + coverage report
        run: npm run test:cov

      - name: Integrační testy (e2e)
        run: npm run test:e2e

      - name: Nahrát coverage report jako artefakt
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================================
  # JOB 2: Docker Build & Push (CD - image)
  # Spustí se pouze po úspěšných testech a pouze na main/feature větvích
  # Sestaví image a publikuje ho do GitHub Container Registry (ghcr.io)
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/testy'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Přihlášení do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata pro Docker image (tag = větev nebo verze)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Sestavení a publikace Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================================
  # JOB 3: Deploy do staging (CD - nasazení)
  # Spustí se automaticky po úspěšném sestavení image
  # Nasadí aplikaci do K8s namespace "staging"
  # ============================================================
  deploy-staging:
    name: Deploy - Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/testy'
    environment: staging
    continue-on-error: true  # lokální minikube není dostupný z GitHub runnerů

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení kubectl
        uses: azure/setup-kubectl@v3

      - name: Nastavení kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Nasazení do namespace staging
        run: |
          kubectl apply -f k8s/namespace-staging.yaml
          kubectl apply -f k8s/secret.yaml -n staging
          kubectl apply -f k8s/configmap.yaml -n staging
          kubectl apply -f k8s/service.yaml -n staging
          kubectl apply -f k8s/staging/deployment.yaml
          kubectl set image deployment/rezervace-app \
            rezervace-app=ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            -n staging
          kubectl rollout status deployment/rezervace-app -n staging
