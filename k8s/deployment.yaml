apiVersion: apps/v1
kind: Deployment
metadata:
  name: rezervace-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rezervace-app
  template:
    metadata:
      labels:
        app: rezervace-app
    spec:
      containers:
        - name: rezervace-app
          image: rezervace-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Nekritické proměnné z ConfigMap
          envFrom:
            - configMapRef:
                name: rezervace-config
          # Citlivé proměnné ze Secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_NAME
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
