apiVersion: apps/v1
kind: Deployment
metadata:
  name: rezervace-app
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rezervace-app
  template:
    metadata:
      labels:
        app: rezervace-app
    spec:
      containers:
        - name: rezervace-app
          image: rezervace-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rezervace-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rezervace-secret
                  key: DB_NAME
          # Production: větší limity, 2 repliky pro dostupnost
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
